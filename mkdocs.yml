site_name: Gov Hub
site_url: "https://gov-hub.io/govhub/"
site_author: Lab Livre
site_description: >-
  Gov Hub - plataforma livre de integração de dados e informações governamentais.
  Explore como a gestão orientada a dados pode transformar a administração pública,
  integrando e qualificando dados de sistemas estruturantes essenciais.

# Repository
repo_name: GovHub-br/gov-hub
repo_url: https://github.com/GovHub-br/gov-hub
edit_uri: edit/main/docs/

# Copyright
copyright: Lab Livre 2025

# Configuration
theme:
  name: material
  language: pt-BR
  features:
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-4
        name: Alternar tema
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.svg
  favicon: assets/favicon.png

# Plugins
plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"\`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

# Hooks
hooks:
  - material/overrides/hooks/shortcodes.py
  - material/overrides/hooks/translations.py
  - material/overrides/hooks/copy_static_assets.py
  - material/overrides/hooks/copy_index.py

# Additional configuration
extra:
  homepage: /govhub/home/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/GovHub-br

extra_javascript:
  - https://www.googletagmanager.com/gtag/js?id=G-J72NDYMYFR
  - js/ga.js


# Custom CSS for Inter font and footer styling
extra_css:
  - https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap
  - documentacao/stylesheets/custom.css

exclude_docs: |
  /blog/
  /comunidade/
  /dicionario-dados/
  /guiasUso/
  /sobre-projeto/
  /ebook.md
  /index.md

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
