    - Revisão de PRs: documentacao/pipeline/protocolo-mr.md
  - Dicionário de Dados:
    - Visão Geral: documentacao/dados/dicionario.md
    - TransfereGov: documentacao/dados/transferegov.md
    - Siape: documentacao/dados/siape.md
    - Siafi: documentacao/dados/siafi.md
    - ComprasGov: documentacao/dados/comprasgov.md
    - Siorg: documentacao/dados/siorg.md
  - Infraestrutura:
    - Kubernetes: documentacao/infraestrutura/kubernetes.md
