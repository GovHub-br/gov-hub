    - Fluxo de Dados: documentacao/arquitetura/fluxo-de-dados.md
    - Arquitetura Medallion: documentacao/arquitetura/medallion.md
    - Componentes: documentacao/arquitetura/componentes.md
    - Fontes de Dados: documentacao/arquitetura/fontes-de-dados.md
  - Pipeline de Dados:
